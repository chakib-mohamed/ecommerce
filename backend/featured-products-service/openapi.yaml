openapi: 3.0.3
info:
  title: featured-products-service API
  description: Returns a curated list of featured products.
  version: 1.0.0
servers:
  - url: /
    description: Service-internal base path

paths:

  /products/featured:
    get:
      summary: List featured products
      operationId: getFeaturedProducts
      parameters:
        - name: pageIndex
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Featured products returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductMongoEntityDto'

components:
  schemas:

    ProductMongoEntityDto:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
          format: uuid
        description:
          type: string
        image_key:
          type: string
          description: Key used to retrieve the product image
        price:
          type: number
          format: double
        title:
          type: string
        promotions:
          type: array
          items:
            $ref: '#/components/schemas/PromotionDto'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryDto'

    PromotionDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        percentage_off:
          type: number
          format: double
        active_from:
          type: string
          format: date
          description: ISO-8601 date (yyyy-MM-dd)
        active_to:
          type: string
          format: date
          description: ISO-8601 date (yyyy-MM-dd)
        product:
          $ref: '#/components/schemas/ProductLiteDto'

    ProductLiteDto:
      type: object
      properties:
        title:
          type: string

    CategoryDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
