# Configuration file
# key = value
#quarkus.http.cors=true
quarkus.http.port=8080
quarkus.application.name=featured-products-service

## Log format - traceId/spanId are loaded into MDC by OpenTelemetry on every line
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] traceId=%X{traceId} spanId=%X{spanId} %s%e%n

## OpenTelemetry - export spans to the collector over OTLP/gRPC; it tail-samples and forwards to Jaeger
quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.traces.sampler=always_on
# dev (make dev-*) runs natively on the host, where the collector is reachable on localhost
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# tests have no collector; disable the SDK so the exporter does not spam connection failures
%test.quarkus.otel.sdk.disabled=true


## Mongodb config
quarkus.mongodb.connection-string = mongodb://mongodb:27017/?replicaSet=rs0
quarkus.mongodb.database = products
quarkus.mongodb.uuid-representation = standard

# Default pagination values
products.default.page.index=0
products.default.page.size=10

# Kafka incoming channels
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092

mp.messaging.incoming.product-updated.connector=smallrye-kafka
mp.messaging.incoming.product-updated.topic=product-updated
mp.messaging.incoming.product-updated.auto.offset.reset=earliest
# Consumer DLQ hardening (spec section 5): isolate poison messages instead of blocking the partition.
# A terminal-failure message (deserialization failure, or processing that fails every @Retry attempt)
# is routed to product-updated-dlq; the existing idempotent upsert is unchanged.
mp.messaging.incoming.product-updated.group.id=featured-products-service-product-updated
mp.messaging.incoming.product-updated.failure-strategy=dead-letter-queue
mp.messaging.incoming.product-updated.dead-letter-queue.topic=product-updated-dlq
mp.messaging.incoming.product-updated.fail-on-deserialization-failure=false
# DLQ forwards the original record's raw bytes; serializers cannot be deduced from the JSON-B
# deserializer, so set them explicitly (String key, raw-byte value).
mp.messaging.incoming.product-updated.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.product-updated.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

mp.messaging.incoming.product-deleted.connector=smallrye-kafka
mp.messaging.incoming.product-deleted.topic=product-deleted
mp.messaging.incoming.product-deleted.auto.offset.reset=earliest
# Same DLQ hardening on the delete channel; idempotent delete-by-uuid is unchanged.
mp.messaging.incoming.product-deleted.group.id=featured-products-service-product-deleted
mp.messaging.incoming.product-deleted.failure-strategy=dead-letter-queue
mp.messaging.incoming.product-deleted.dead-letter-queue.topic=product-deleted-dlq
mp.messaging.incoming.product-deleted.fail-on-deserialization-failure=false
mp.messaging.incoming.product-deleted.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.product-deleted.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# OpenAPI / Swagger UI - spec served at /q/openapi; UI available in dev mode only
quarkus.swagger-ui.always-include=false

# JSON config
# Handled by CustomJsonbConfigCustomizer
