# Configuration file
# key = value
#quarkus.http.cors=true
quarkus.http.port=8080
quarkus.application.name=authenticate-service

security.jwt.expiration=60
security.jwt.private-key=${JWT_PRIVATE_KEY}
security.jwt.public-key=${JWT_PUBLIC_KEY}


## Mongodb config
quarkus.mongodb.connection-string = mongodb://mongodb:27017
quarkus.mongodb.database = authenticate

## OpenAPI / Swagger UI — spec served at /q/openapi; UI available in dev mode only
quarkus.swagger-ui.always-include=false

## JSON config — snake_case + null omission via CustomJsonbConfigCustomizer