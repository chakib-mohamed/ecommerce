openapi: 3.0.3
info:
  title: orders-service API
  description: Shopping cart and order management. All endpoints require authentication.
  version: 1.0.0
servers:
  - url: /
    description: Service-internal base path

security:
  - bearerAuth: []

paths:

  /cart:
    get:
      summary: Get the current user's cart
      operationId: getCart
      responses:
        '200':
          description: Cart retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: No cart exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Clear the entire cart
      operationId: clearCart
      responses:
        '204':
          description: Cart cleared

  /cart/items:
    post:
      summary: Add a product to the cart
      operationId: addItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '201':
          description: Item added; updated cart returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Validation error (blank product_id or quantity < 1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cart/items/{productId}:
    put:
      summary: Update the quantity of a cart item
      operationId: updateItem
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Item updated; updated cart returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Validation error (quantity < 1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Remove a single item from the cart
      operationId: removeItem
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item removed
        '404':
          description: Product not in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cart/checkout:
    post:
      summary: Checkout — create an order from the cart and clear it
      description: Converts the current cart into an order, clears it, and returns the created order.
      operationId: checkout
      responses:
        '201':
          description: Order created from cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Cart is empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Price service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    post:
      summary: Create an order directly (without cart)
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update an order
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/search:
    post:
      summary: Search orders
      operationId: searchOrders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchOrdersCommand'
      responses:
        '200':
          description: Total count and page of matching orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSearchResult'
        '400':
          description: Validation error (blank user_id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{orderID}:
    delete:
      summary: Delete an order
      operationId: deleteOrder
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order deleted
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{orderID}/confirm:
    post:
      summary: Confirm an order
      operationId: confirmOrder
      parameters:
        - name: orderID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    CartResponse:
      type: object
      properties:
        user_id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        updated_at:
          type: string
          format: date-time
          description: ISO-8601 datetime of the last cart modification

    CartItemResponse:
      type: object
      properties:
        product_id:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: double
        total_price:
          type: number
          format: double

    AddItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
        quantity:
          type: integer
          minimum: 1

    UpdateItemRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 1

    OrderDTO:
      type: object
      properties:
        id:
          type: string
        card_number:
          type: string
        creation_date:
          type: string
          format: date-time
          description: ISO-8601 datetime
        expiration_date:
          type: string
        price:
          type: number
          format: double
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductVO'
        user_id:
          type: string
        validation_number:
          type: string
        status:
          type: string
          enum: [INITIATED, CONFIRMED]

    OrderRequest:
      type: object
      required:
        - products
      properties:
        id:
          type: string
        products:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ProductVO'

    ProductVO:
      type: object
      required:
        - product_id
        - qty
        - price
      properties:
        product_id:
          type: string
        title:
          type: string
        qty:
          type: integer
          minimum: 1
        price:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        percentage_off:
          type: number
          format: double
          description: Active promotion discount percentage; omitted if no active promotion

    SearchOrdersCommand:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        offset:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        sort_by:
          type: string

    OrderSearchResult:
      type: object
      properties:
        x:
          type: integer
          format: int64
          description: Total number of matching orders
        y:
          type: array
          items:
            $ref: '#/components/schemas/OrderDTO'

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          enum: [FUNCTIONAL, TECHNICAL]
        error_code:
          type: string
        message:
          type: string
