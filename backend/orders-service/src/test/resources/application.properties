quarkus.http.test-port=0
%test.quarkus.devservices.enabled=false
%test.quarkus.mongodb.database=orders-test

# Outbox relay: park the scheduled timer far out so pollAndPublish()/requestPoll() are the
# only triggers under test (mirrors price-service test config).
orders.outbox.poll-interval=24h
orders.outbox.batch-size=100

# Outbox purge: park the purge timer too so purgeOldPublished() is the only trigger in tests.
orders.outbox.purge-interval=24h
