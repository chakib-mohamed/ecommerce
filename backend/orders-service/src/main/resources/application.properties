# Configuration file
# key = value
#quarkus.http.cors=true
quarkus.http.port=8080
quarkus.application.name=orders-service

## Log format - traceId/spanId are loaded into MDC by OpenTelemetry on every line
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] traceId=%X{traceId} spanId=%X{spanId} %s%e%n

## OpenTelemetry - export spans to the collector over OTLP/gRPC; it tail-samples and forwards to Jaeger
quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.traces.sampler=always_on
# ship application logs over OTLP to the Collector (additive - console handler stays on)
quarkus.otel.logs.enabled=true
# dev (make dev-*) runs natively on the host, where the collector is reachable on localhost
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# tests have no collector; disable the SDK so the exporter does not spam connection failures
%test.quarkus.otel.sdk.disabled=true

# JWT verification - the @Authenticated cart/orders endpoints validate the end-user's bearer token.
# authenticate-service mints RS256 tokens with no issuer claim, so no mp.jwt.verify.issuer is set
# (an issuer here would reject every real token). The public key is the base64 DER held in JWT_PUBLIC_KEY.
%prod.mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
%dev.mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
%test.mp.jwt.verify.publickey.location=publicKey.pem

# Zero-trust internal hop: forward the end-user's Authorization header on the orders -> pricing
# rest-client call so price-service independently verifies the same token (see PricingApiClient).
org.eclipse.microprofile.rest.client.propagateHeaders=Authorization

# Tests mint their own RS256 tokens to exercise real JWT verification (test keypair in test resources)
%test.smallrye.jwt.sign.key.location=privateKey.pem

## OpenAPI / Swagger UI - spec served at /q/openapi; UI available in dev mode only
quarkus.swagger-ui.always-include=false

## Redis - price cache
quarkus.redis.hosts=redis://redis:6379
cart.price-cache.ttl-minutes=15


## Mongodb config
quarkus.mongodb.connection-string = mongodb://mongodb:27017/?replicaSet=rs0
quarkus.mongodb.database = orders
## STANDARD UUID representation so the outbox entry id (UUID _id) encodes cleanly
quarkus.mongodb.uuid-representation=STANDARD
# Dev (make dev-orders) talks to the infra Mongo on localhost. The replica-set member is advertised
# as mongodb:27017 (unresolvable from the host), so connect directly - directConnection still
# supports the multi-document outbox transaction against the primary.
%dev.quarkus.mongodb.connection-string=mongodb://localhost:27017/?directConnection=true

## Test profile - use localhost Redis (PriceCacheService mocked; this avoids resolving "redis" hostname)
%test.quarkus.redis.hosts=redis://localhost:6379
%test.quarkus.redis.devservices.enabled=false

## Products Api endpoint conf
the.chak.ecommerce.products.boundary.ProductsApi/mp-rest/url=http://api-gateway:8080/api
the.chak.ecommerce.products.boundary.ProductsApi/mp-rest/scope=jakarta.inject.Singleton

## Pricing Api endpoint conf
the.chak.ecommerce.orders.control.PricingApiClient/mp-rest/url=http://api-gateway:8080/api
the.chak.ecommerce.orders.control.PricingApiClient/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
# Kafka configuration
mp.messaging.outgoing.order-initiated.connector=smallrye-kafka
mp.messaging.outgoing.order-initiated.topic=order-initiated
%dev.mp.messaging.outgoing.order-initiated.bootstrap.servers=localhost:9092
%prod.mp.messaging.outgoing.order-initiated.bootstrap.servers=kafka:9092
mp.messaging.outgoing.order-initiated.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer
# acks=all + enable.idempotence requires acks=all (SmallRye defaults to acks=1) and max.in.flight<=5;
# retries is bounded because the OutboxRelay tick re-sends any row left unpublished (durable outer retry).
mp.messaging.outgoing.order-initiated.acks=all
mp.messaging.outgoing.order-initiated.enable.idempotence=true
mp.messaging.outgoing.order-initiated.max.in.flight.requests.per.connection=5
mp.messaging.outgoing.order-initiated.retries=10

# Transactional outbox relay
orders.outbox.poll-interval=1s
orders.outbox.batch-size=100
# Per-row publish retry cap: after this many failed attempts on a poison entry (bad payload /
# unknown topic) the relay stamps it failed and stops retrying it. Broker outages do not count.
orders.outbox.max-retries=5

# Outbox retention purge: drop entries published longer ago than the retention window, keeping a
# short-term audit trail. Unpublished entries are never purged. retention is an ISO-8601 duration.
orders.outbox.purge-interval=1h
orders.outbox.retention=P7D

## JSON config - snake_case + null omission via CustomJsonbConfigCustomizer
