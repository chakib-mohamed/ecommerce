quarkus.http.test-port=0
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:tc:postgresql:16-alpine:///products
%test.quarkus.datasource.username=test
%test.quarkus.datasource.password=test
%test.quarkus.datasource.jdbc.driver=org.testcontainers.jdbc.ContainerDatabaseDriver
quarkus.datasource.jdbc.acquisition-timeout=PT300S
%test.quarkus.devservices.enabled=false

# Outbox relay: park the scheduled timer far out so pollAndPublish()/requestPoll()
# are the only triggers during tests (deterministic, no background ticks).
products.outbox.poll-interval=24h
products.outbox.batch-size=100

# Outbox purge: park the purge timer too so purgeOldPublished() is the only trigger in tests.
products.outbox.purge-interval=24h
products.outbox.retention=P7D
