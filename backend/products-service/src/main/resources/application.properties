# Configuration file
# key = value
#quarkus.http.cors=true
quarkus.application.name=products-service
quarkus.http.port=8080

## Log format - carries the correlation id (requestId) from MDC on every line
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] requestId=%X{requestId} %s%e%n


# postgres datasource
quarkus.datasource.db-kind = postgresql
quarkus.datasource.jdbc.acquisition-timeout=PT300S
quarkus.datasource.jdbc.url = jdbc:postgresql://postgres:5432/products
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy


# Liquibase minimal config properties
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# Kafka configuration
%dev.kafka.bootstrap.servers=localhost:9092
mp.messaging.incoming.price-changed.connector=smallrye-kafka
mp.messaging.incoming.price-changed.topic=price-changed
mp.messaging.incoming.price-changed.value.deserializer=the.chak.ecommerce.products.control.events.PriceChangedEventDeserializer
# Consumer DLQ hardening (spec section 5): isolate poison messages instead of blocking the partition.
# A terminal-failure message (deserialization failure, or processing that fails every @Retry attempt)
# is routed to price-changed-dlq; the existing idempotent updatePrice upsert is unchanged.
mp.messaging.incoming.price-changed.group.id=products-service-price-changed
mp.messaging.incoming.price-changed.failure-strategy=dead-letter-queue
mp.messaging.incoming.price-changed.dead-letter-queue.topic=price-changed-dlq
mp.messaging.incoming.price-changed.fail-on-deserialization-failure=false
# DLQ forwards the original record's raw bytes; serializers cannot be deduced from the custom
# JSON-B deserializer, so set them explicitly (String key, raw-byte value).
mp.messaging.incoming.price-changed.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.price-changed.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

mp.messaging.outgoing.product-updated.connector=smallrye-kafka
mp.messaging.outgoing.product-updated.topic=product-updated
mp.messaging.outgoing.product-updated.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer
mp.messaging.outgoing.product-deleted.connector=smallrye-kafka
mp.messaging.outgoing.product-deleted.topic=product-deleted
mp.messaging.outgoing.product-deleted.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Producer hardening (spec section 4): durable, ordering-safe, broker-deduplicated relay publish.
# acks=all + enable.idempotence requires acks=all (SmallRye defaults to acks=1) and max.in.flight<=5;
# retries is bounded because the OutboxRelay tick re-sends any row left unpublished (durable outer retry).
mp.messaging.outgoing.product-updated.acks=all
mp.messaging.outgoing.product-updated.enable.idempotence=true
mp.messaging.outgoing.product-updated.max.in.flight.requests.per.connection=5
mp.messaging.outgoing.product-updated.retries=10
mp.messaging.outgoing.product-deleted.acks=all
mp.messaging.outgoing.product-deleted.enable.idempotence=true
mp.messaging.outgoing.product-deleted.max.in.flight.requests.per.connection=5
mp.messaging.outgoing.product-deleted.retries=10

# Transactional outbox relay
products.outbox.poll-interval=1s
products.outbox.batch-size=100
# Per-row publish retry cap: after this many failed attempts on a poison row (bad payload /
# unknown topic) the relay stamps it failed and stops retrying it. Broker outages do not count.
products.outbox.max-retries=5

# Outbox retention purge: drop rows published longer ago than the retention window, keeping a
# short-term audit trail. Unpublished rows are never purged. retention is an ISO-8601 duration.
products.outbox.purge-interval=1h
products.outbox.retention=P7D

# Object storage (LocalStack)
products.storage.endpoint=http://localstack:4566
products.storage.region=us-east-1
products.storage.access-key=test
products.storage.secret-key=test

%dev.products.storage.endpoint=http://localhost:4566

products.images.bucket=product-images

# OpenAPI / Swagger UI - spec served at /q/openapi; UI available in dev mode only
quarkus.swagger-ui.always-include=false

# JSON config - snake_case + null omission via CustomJsonbConfigCustomizer
