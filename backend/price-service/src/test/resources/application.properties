quarkus.http.test-port=0
%test.quarkus.devservices.enabled=false
%test.quarkus.mongodb.database=price-test

# Outbox relay: park the scheduled timer far out so pollAndPublish()/requestPoll() are the
# only triggers under test (mirrors products-service test config).
pricing.outbox.poll-interval=24h
pricing.outbox.batch-size=100

# Outbox purge: park the purge timer too so purgeOldPublished() is the only trigger in tests.
pricing.outbox.purge-interval=24h
