server:
  port: 8080

spring:
  application:
    name: ecommerce-api-gateway
  reactor:
    # Restore the trace context into ThreadLocal across reactive operators, so
    # traceId/spanId reach the log MDC and the X-Trace-Id response header.
    context-propagation: auto
  cloud:
    gateway:
      routes:
        - id: authentication-service
          uri: http://authenticate-service:8080
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        
        - id: products-featured-service
          uri: http://featured-products-service:8080
          predicates:
            - Path=/api/products/featured
          filters:
            - StripPrefix=1

        - id: products-service
          uri: http://products-service:8080
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/promotions/**
          filters:
            - StripPrefix=1

        - id: orders-service
          uri: http://orders-service:8080
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: cart-service
          uri: http://orders-service:8080
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
            
        - id: price-service
          uri: http://price-service:8080
          predicates:
            - Path=/api/prices/**
          filters:
            - StripPrefix=1

        - id: price-service-payments
          uri: http://price-service:8080
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

cors:
  allowed-origins: []
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - HEAD
  allowed-headers:
    - Authorization
    - Content-Type
  allow-credentials: false

management:
  health:
    probes:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      # Export every span; the OTel Collector owns the keep/drop decision (tail sampling).
      probability: 1.0
  otlp:
    tracing:
      # Spans go to the OTel Collector over OTLP/gRPC; it tail-samples and forwards to Jaeger.
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
      transport: grpc

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

