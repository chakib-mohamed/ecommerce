server:
  port: 8080

spring:
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
    gateway:
      routes:
        - id: authentication-service
          uri: http://authentication-service:8080
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        
        - id: products-featured-service
          uri: http://featured-products-service:8080
          predicates:
            - Path=/api/products/featured
          filters:
            - StripPrefix=1

        - id: products-service
          uri: http://products-service:8080
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/promotions/**
          filters:
            - StripPrefix=1

        - id: orders-service
          uri: http://orders-service:8080
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: cart-service
          uri: http://orders-service:8080
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
            
        - id: price-service
          uri: http://price-service:8080
          predicates:
            - Path=/api/prices/**
          filters:
            - StripPrefix=1

        - id: payments-service
          uri: http://price-service:8080
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

