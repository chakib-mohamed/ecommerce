# OpenTelemetry Collector — the single ingestion point for traces and logs.
# All services export OTLP here; the Collector tail-samples traces and forwards them to
# Jaeger, and forwards logs to Loki (native OTLP ingest) via the otlphttp exporter.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Tail sampling decides per-trace AFTER the whole trace is buffered, so we keep
  # every error and slow trace and sample only the routine ones. This is why
  # services export at always_on — the keep/drop decision lives here, not at the source.
  tail_sampling:
    decision_wait: 10s
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow
        type: latency
        latency:
          threshold_ms: 500
      - name: sample-the-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 10
  batch: {}

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Loki ingests OTLP natively at /otlp; the legacy `loki` exporter is removed,
  # so logs go over otlphttp. trace_id/span_id arrive as structured metadata.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, batch]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
