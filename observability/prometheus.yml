# Prometheus scrape configuration for the local observability stack.
# Phase 1 shipped Prometheus's own self-scrape; Phase 2 adds the gateway job below.
# The six Quarkus service jobs are added in Phase 4 — see docs/tasks/observability-plan.md.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Spring Boot gateway — Micrometer renders metrics in Prometheus format at the
  # Actuator endpoint. Reachable as api-gateway:8080 on the shared backend network.
  - job_name: ecommerce-api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
