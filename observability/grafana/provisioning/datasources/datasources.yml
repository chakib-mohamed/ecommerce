# Grafana datasource provisioning — Prometheus (metrics) + Jaeger (traces).
# Loaded automatically on startup from /etc/grafana/provisioning/datasources.
# Dashboards are provisioned later in Phase 6.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
