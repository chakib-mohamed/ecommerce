name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc      # Node 20.20.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps             # matches frontend/Dockerfile
      - run: npm run lint
      - run: npm run build                         # tsc + vite build

  backend:
    runs-on: ubuntu-latest                         # Docker preinstalled -> Testcontainers works
    env:
      TESTCONTAINERS_REUSE_ENABLE: "true"          # share Mongo/Kafka/etc. across the sequential per-service runs
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Sequential per-service `verify`: full lifecycle = compile + unit + integration
      # tests + Checkstyle + SpotBugs + JaCoCo coverage. `-am` also builds the shared
      # products-api / orders-api modules each service depends on. One service at a
      # time so Testcontainers never saturates Docker.
      - name: Backend verify (per service, sequential)
        run: |
          set -euo pipefail
          SERVICES=(
            authenticate-service
            featured-products-service
            price-service
            orders-service
            products-service
            ecommerce-api-gateway
          )
          for svc in "${SERVICES[@]}"; do
            echo "::group::verify $svc"
            ./mvnw -B --no-transfer-progress verify -pl "$svc" -am
            echo "::endgroup::"
          done

  # Dependency vulnerability gate: one Trivy fs scan over the whole repo covers
  # both the Maven backend (backend/**/pom.xml) and the npm frontend
  # (frontend/package-lock.json). A fresh checkout has no node_modules, so only
  # declared dependencies are scanned.
  dependency-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write          # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v5

      # Report pass: all severities, never fails — produces the SARIF report.
      - name: Trivy vulnerability scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-results.sarif

      # Upload even when the gate pass below fails, so findings always surface.
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      # Gate pass: fail the build only on CRITICAL vulnerabilities. Trivy's vuln
      # DB is cached from the pass above, so this is fast.
      - name: Trivy vulnerability gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: false
          exit-code: '1'
          format: table
