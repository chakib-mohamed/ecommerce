services:
  ecommerce-front:
    build:
      context: ./frontend
    ports:
      - 81:80
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s


  api-gateway:
    image: ecommerce/ecommerce-api-gateway
    build:
      context: ./backend/ecommerce-api-gateway
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 8080:8080
    environment:
      - JWT_PUBLIC_KEY
    depends_on:
      - redis
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  authenticate-service:
    build:
      context: ./backend/authenticate-service
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - 8081:8080
    environment:
      - QUARKUS_PROFILE=prod
      - JWT_PUBLIC_KEY
      - JWT_PRIVATE_KEY
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  products-service:
    build:
      context: ./backend/products-service
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - 8082:8080
    environment:
      - QUARKUS_PROFILE=prod
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  featured-products-service:
    build:
      context: ./backend/featured-products-service
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - 8083:8080
    environment:
      - QUARKUS_PROFILE=prod
      - MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - QUARKUS_MONGODB_CONNECTION_STRING=mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  orders-service:
    build:
      context: ./backend/orders-service
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - 8084:8080
    environment:
      - QUARKUS_PROFILE=prod
      - QUARKUS_MONGODB_CONNECTION_STRING=mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  price-service:
    build:
      context: ./backend/price-service
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - 8085:8080
    environment:
      - QUARKUS_PROFILE=prod
      - QUARKUS_MONGODB_CONNECTION_STRING=mongodb://mongodb:27017
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  mongodb:
    image: mongo:6.0
    ports:
      - 27017:27017
    networks:
      - backend
    volumes:
      - mongodb_data:/data/db
      - ./backend/dev-scripts/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=products
    ports:
      - 5432:5432
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:4
    ports:
      - 4566:4566
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.0-alpine
    ports:
      - 6379:6379
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontend:
  backend:

volumes:
  mongodb_data:
  postgres_data:
